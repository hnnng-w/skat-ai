name: Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install package with development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run input JSON schema validation
        run: python scripts/validate_examples_schema.py

      - name: Run generated output JSON schema validation
        run: python scripts/validate_generated_outputs_schema.py

      - name: Run tests
        run: python -m pytest